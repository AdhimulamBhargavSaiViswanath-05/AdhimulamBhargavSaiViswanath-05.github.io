<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ABSV portfolio - AI/ML student portfolio rebuilt with modern UI, Radix UI, and static GitHub Pages deployment." />
    <title>Adhimulam Bhargav Sai Viswanath | Portfolio</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const savedTheme = localStorage.getItem('theme');
        const preferredTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : preferredTheme;
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <script type="module">
      (async () => {
        const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || (location.port && location.port.startsWith('5173'));
        if (isDev) {
          await import('/src/main.jsx');
        } else {
          // Production: do not load the Vite dev entry. GitHub Pages should serve the built artifact (dist/index.html).
          // Leaving an empty root div prevents browsers from requesting /src/main.jsx (which causes MIME errors).
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
