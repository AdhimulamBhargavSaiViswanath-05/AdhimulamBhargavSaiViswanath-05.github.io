name: Generate GitHub Profile Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Custom Stats SVG
        uses: cicirello/user-statistician@v1
        with:
          image-file: github-stats.svg
          include-languages: true
          custom-colors: 'bg=0d1117,title=58a6ff,text=c9d1d9,icons=8b949e,border=30363d'

      - name: Commit and Push generated image
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update profile stats SVG" && git push)
